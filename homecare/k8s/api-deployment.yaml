apiVersion: apps/v1
kind: Deployment
metadata:
  name: homecare-api
  namespace: homecare
  labels:
    app: homecare-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: homecare-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: homecare-api
    spec:
      containers:
        - name: api
          image: homecare/api:latest
          ports:
            - containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: homecare-config
            - secretRef:
                name: homecare-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: homecare-api-svc
  namespace: homecare
spec:
  selector:
    app: homecare-api
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: homecare-api-hpa
  namespace: homecare
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homecare-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
