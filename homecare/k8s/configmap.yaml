apiVersion: v1
kind: ConfigMap
metadata:
  name: homecare-config
  namespace: homecare
data:
  NODE_ENV: "production"
  PORT: "5000"
  CLIENT_URL: "https://homecare.app"
  REDIS_URL: "redis://homecare-redis-svc:6379"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

---
apiVersion: v1
kind: Secret
metadata:
  name: homecare-secrets
  namespace: homecare
type: Opaque
stringData:
  MONGODB_URI: "mongodb://homecare-mongo-svc:27017/homecare"
  JWT_SECRET: "CHANGE-THIS-TO-A-STRONG-SECRET"
  AGORA_APP_ID: "your-agora-app-id"
  AGORA_APP_CERTIFICATE: "your-agora-certificate"
